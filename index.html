<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ishihara Color Blind Test</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Ishihara Color Blind Test 1.0</h1>
    <h3>SPMB 2026/2027</h3>

    <div id="nameSection">
      <input type="text" id="userName" placeholder="Masukkan Nama anda" />
      <button onclick="startTest()">Mulai Tes</button>
    </div>
    <h6>SMKN 1 Singkarak &copy; 2026</h6>

    <div id="testSection" style="display:none;">
      <p id="greeting"></p>
      <img id="plateImage" src="" alt="Ishihara Plate" />
      <p>Gambar ini berisi angka, jika tidak melihat angka apapun klik submit</p>
      <input type="number" id="answerInput" placeholder="Angka apa yang anda lihat?" />
      <button onclick="submitAnswer()">Submit</button>
      <p id="plateCount"></p>
    </div>

    <div id="resultSection" style="display:none;">
      <h2>Hasil Test</h2>
      <p id="finalResult"></p>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
