<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ishihara Color Blind Test</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    
    <div class="header-container">
      
      <div class="header-text">
        <h1>Ishihara Color Blind Test 1.0</h1>
        <h3>SPMB 2026/2027</h3>

        <div id="nameSection">
          <input type="text" id="userName" placeholder="Masukkan Nama anda" />
          <button onclick="startTest()">Mulai Tes</button>
        </div>
        <h6>SMKN 1 Singkarak &copy; 2026</h6>
      </div>

      <div class="header-image">
        <img src="qrcode_365608204_bf5613cf69a30281dfc26e9d8a366a11.png" alt="Scan Me QR Code" class="qr-img">
      </div>

    </div>
    
    <div id="testSection" style="display:none;">
      <p id="greeting"></p>
      <img id="plateImage" src="" alt="Ishihara Plate" />
      <p>Gambar ini berisi angka, jika tidak melihat angka apapun klik submit</p>
      <input type="number" id="answerInput" placeholder="Angka apa yang anda lihat?" />
      <button onclick="submitAnswer()">Submit</button>
      <p id="plateCount"></p>
    </div>

    <div id="resultSection" style="display:none;">
      <h2>Hasil Test</h2>
      <p id="finalResult"></p>
    </div>
    
  </div>

  <script src="script.js"></script>
</body>
</html>
